<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Monitor Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #111; --bg-secondary: #1a1c1e; --text: #eee; --text-muted: #888; --border: #333; --accent: #2563eb; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 30%; min-width: 240px; max-width: 400px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
    #sidebar-header { padding: 10px 12px; font-size: 14px; font-weight: 600; border-bottom: 1px solid var(--border); background: var(--bg-secondary); }
    #news-list { flex: 1; overflow-y: auto; }
    .news-item { padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .news-item:hover { background: rgba(255,255,255,0.05); }
    .news-title { font-size: 13px; line-height: 1.35; margin-bottom: 4px; }
    .news-meta { font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; }
    #browser { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #tab-bar { display: flex; align-items: center; background: var(--bg-secondary); border-bottom: 1px solid var(--border); min-height: 32px; padding: 0 4px; overflow-x: auto; flex-shrink: 0; }
    .tab { display: flex; align-items: center; gap: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: #ccc; border-right: 1px solid var(--border); max-width: 180px; min-width: 80px; white-space: nowrap; overflow: hidden; }
    .tab.active { background: var(--bg); color: #fff; }
    .tab-close { cursor: pointer; font-size: 14px; color: var(--text-muted); padding: 0 2px; }
    #nav-bar { display: flex; align-items: center; gap: 6px; padding: 6px 8px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .nav-btn { width: 28px; height: 28px; border: none; border-radius: 4px; background: transparent; color: var(--text); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .nav-btn:hover { background: rgba(255,255,255,0.1); }
    .nav-btn:disabled { opacity: 0.35; cursor: default; }
    #url-input { flex: 1; height: 28px; padding: 0 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
    #url-input:focus { border-color: var(--accent); }
    #viewport { flex: 1; position: relative; overflow: hidden; }
    #viewport iframe { width: 100%; height: 100%; border: none; }
    #resize-handle { width: 5px; cursor: col-resize; background: var(--border); flex-shrink: 0; transition: background 0.15s; }
    #resize-handle:hover, #resize-handle.active { background: var(--accent); }
    .error-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text-muted); padding: 24px; text-align: center; }
    .error-view a { color: #60a5fa; font-size: 13px; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">Local News</div>
    <div id="news-list"><div class="loading">Loading news...</div></div>
  </div>
  <div id="resize-handle"></div>
  <div id="browser">
    <div id="tab-bar"></div>
    <div id="nav-bar">
      <button class="nav-btn" id="backBtn" title="Back">◀</button>
      <button class="nav-btn" id="fwdBtn" title="Forward">▶</button>
      <button class="nav-btn" id="refreshBtn" title="Refresh">↻</button>
      <input type="text" id="url-input" placeholder="Enter URL or search..." />
      <button class="nav-btn" id="newTabBtn" title="New Tab" style="font-weight:bold;font-size:16px;">+</button>
    </div>
    <div id="viewport"></div>
  </div>

  <script>
    const HOME = 'https://lite.duckduckgo.com/lite/';
    let tabs = [];
    let activeTabId = '';

    // ── Elements ──
    const tabBar = document.getElementById('tab-bar');
    const viewport = document.getElementById('viewport');
    const urlInput = document.getElementById('url-input');
    const backBtn = document.getElementById('backBtn');
    const fwdBtn = document.getElementById('fwdBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const newTabBtn = document.getElementById('newTabBtn');
    const newsList = document.getElementById('news-list');
    const sidebarHeader = document.getElementById('sidebar-header');
    const sidebar = document.getElementById('sidebar');
    const handle = document.getElementById('resize-handle');

    // ── Tab logic ──
    function makeId() { return 't' + Date.now() + Math.random().toString(36).slice(2,6); }
    function getTab() { return tabs.find(t => t.id === activeTabId); }

    function addTab(url) {
      url = url || HOME;
      const tab = { id: makeId(), url, title: 'New Tab', history: [url], idx: 0 };
      tabs.push(tab);
      switchTab(tab.id);
      renderTabs();
    }

    function switchTab(id) {
      activeTabId = id;
      const tab = getTab();
      if (tab) { urlInput.value = tab.url; loadPage(tab.url); updateNav(); }
      renderTabs();
    }

    function closeTab(id) {
      if (tabs.length <= 1) return;
      const i = tabs.findIndex(t => t.id === id);
      if (i === -1) return;
      tabs.splice(i, 1);
      if (activeTabId === id) switchTab(tabs[Math.min(i, tabs.length - 1)].id);
      renderTabs();
    }

    function renderTabs() {
      tabBar.innerHTML = '';
      tabs.forEach(tab => {
        const el = document.createElement('div');
        el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
        const lbl = document.createElement('span');
        lbl.style.cssText = 'flex:1;overflow:hidden;text-overflow:ellipsis;';
        lbl.textContent = tab.title || extractDomain(tab.url);
        el.appendChild(lbl);
        if (tabs.length > 1) {
          const x = document.createElement('span');
          x.className = 'tab-close'; x.textContent = '×';
          x.onclick = e => { e.stopPropagation(); closeTab(tab.id); };
          el.appendChild(x);
        }
        el.onclick = () => switchTab(tab.id);
        tabBar.appendChild(el);
      });
    }

    // ── Navigation ──
    function navigateTo(raw, skipHistory) {
      let url = raw;
      if (!url.includes('://') && !url.startsWith('//')) {
        url = (url.includes('.') && !url.includes(' ')) ? 'https://' + url : 'https://lite.duckduckgo.com/lite/?q=' + encodeURIComponent(url);
      }
      const tab = getTab();
      if (!tab) return;
      tab.url = url;
      if (!skipHistory) {
        tab.history = tab.history.slice(0, tab.idx + 1);
        tab.history.push(url);
        tab.idx = tab.history.length - 1;
      }
      urlInput.value = url;
      loadPage(url);
      updateNav();
      renderTabs();
    }

    function goBack() { const t = getTab(); if (!t || t.idx <= 0) return; t.idx--; t.url = t.history[t.idx]; urlInput.value = t.url; loadPage(t.url); updateNav(); }
    function goFwd() { const t = getTab(); if (!t || t.idx >= t.history.length - 1) return; t.idx++; t.url = t.history[t.idx]; urlInput.value = t.url; loadPage(t.url); updateNav(); }
    function reload() { const t = getTab(); if (t) loadPage(t.url); }
    function updateNav() { const t = getTab(); backBtn.disabled = !t || t.idx <= 0; fwdBtn.disabled = !t || t.idx >= t.history.length - 1; }

    /** Route URL through web-proxy to strip X-Frame-Options / CSP headers */
    function proxyUrl(url) {
      try {
        const u = new URL(url);
        if (u.origin === location.origin) return url;
        if (u.hostname === 'lite.duckduckgo.com') return url;
      } catch { return url; }
      return '/api/web-proxy?url=' + encodeURIComponent(url);
    }

    function loadPage(url) {
      viewport.innerHTML = '';
      const loading = document.createElement('div');
      loading.className = 'loading';
      loading.textContent = 'Loading ' + extractDomain(url) + '...';
      viewport.appendChild(loading);

      const iframe = document.createElement('iframe');
      iframe.style.cssText = 'width:100%;height:100%;border:none;background:#fff;display:none;';
      iframe.referrerPolicy = 'no-referrer';
      iframe.addEventListener('load', () => {
        if (loading.parentNode) loading.remove();
        iframe.style.display = '';
        const tab = getTab();
        if (!tab) return;
        try { const t = iframe.contentDocument?.title; if (t) tab.title = t; } catch { tab.title = extractDomain(tab.url); }
        renderTabs();
      });
      iframe.addEventListener('error', () => showError(url));
      iframe.src = proxyUrl(url);
      viewport.appendChild(iframe);
    }

    function showError(url) {
      viewport.innerHTML = '';
      const d = document.createElement('div'); d.className = 'error-view';
      d.innerHTML = '<div style="font-size:24px;margin-bottom:8px;">⚠️</div><div>Could not load this page.</div><div style="font-size:12px;opacity:0.7;margin:4px 0 12px;">' + extractDomain(url) + '</div>';
      const a = document.createElement('a'); a.href = url; a.target = '_blank'; a.rel = 'noopener'; a.textContent = 'Open in new browser tab ↗';
      d.appendChild(a);
      viewport.appendChild(d);
    }

    function extractDomain(url) { try { return new URL(url).hostname; } catch { return url.slice(0, 30); } }

    // ── Events ──
    backBtn.onclick = goBack;
    fwdBtn.onclick = goFwd;
    refreshBtn.onclick = reload;
    newTabBtn.onclick = () => addTab();
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigateTo(urlInput.value.trim()); });
    urlInput.addEventListener('focus', () => urlInput.select());

    // ── Resize handle ──
    let resizing = false, startX = 0, startW = 0;
    handle.addEventListener('mousedown', e => {
      e.preventDefault(); resizing = true; startX = e.clientX; startW = sidebar.getBoundingClientRect().width;
      handle.classList.add('active'); document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', e => { if (!resizing) return; e.preventDefault(); sidebar.style.width = Math.max(180, Math.min(600, startW + e.clientX - startX)) + 'px'; });
    document.addEventListener('mouseup', () => { if (!resizing) return; resizing = false; handle.classList.remove('active'); document.body.style.cursor = ''; document.body.style.userSelect = ''; });

    // ── News sidebar ──
    async function loadNews() {
      let countryCode = 'US', countryName = 'World';
      const MAP = {US:{r:'US',l:'en',n:'United States'},GB:{r:'GB',l:'en',n:'United Kingdom'},DE:{r:'DE',l:'de',n:'Germany'},FR:{r:'FR',l:'fr',n:'France'},NL:{r:'NL',l:'nl',n:'Netherlands'},ES:{r:'ES',l:'es',n:'Spain'},IT:{r:'IT',l:'it',n:'Italy'},JP:{r:'JP',l:'ja',n:'Japan'},BR:{r:'BR',l:'pt-BR',n:'Brazil'},IN:{r:'IN',l:'en',n:'India'},AU:{r:'AU',l:'en',n:'Australia'},CA:{r:'CA',l:'en',n:'Canada'},IL:{r:'IL',l:'he',n:'Israel'},UA:{r:'UA',l:'uk',n:'Ukraine'},PL:{r:'PL',l:'pl',n:'Poland'},TR:{r:'TR',l:'tr',n:'Turkey'},KR:{r:'KR',l:'ko',n:'South Korea'},MX:{r:'MX',l:'es',n:'Mexico'},AR:{r:'AR',l:'es',n:'Argentina'},ZA:{r:'ZA',l:'en',n:'South Africa'}};
      try { const r = await fetch('/api/geo'); if (r.ok) { const d = await r.json(); countryCode = d.country || 'US'; } } catch {}
      const m = MAP[countryCode] || {r:'US',l:'en',n:'World'};
      countryName = m.n;
      sidebarHeader.textContent = 'News — ' + countryName;

      const feedUrl = 'https://news.google.com/rss?hl=' + m.l + '&gl=' + m.r + '&ceid=' + m.r + ':' + m.l;
      try {
        const resp = await fetch('/api/rss-proxy?url=' + encodeURIComponent(feedUrl));
        if (!resp.ok) throw new Error(resp.status);
        const xml = await resp.text();
        const doc = new DOMParser().parseFromString(xml, 'text/xml');
        const items = doc.querySelectorAll('item');
        newsList.innerHTML = '';
        if (items.length === 0) { newsList.innerHTML = '<div style="padding:16px;text-align:center;color:#888;">No news available</div>'; return; }
        items.forEach((item, i) => {
          if (i >= 50) return;
          const title = item.querySelector('title')?.textContent?.trim() || '';
          const link = item.querySelector('link')?.textContent?.trim() || '';
          const source = item.querySelector('source')?.textContent?.trim() || '';
          const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
          if (!title || !link) return;
          const row = document.createElement('div'); row.className = 'news-item';
          row.innerHTML = '<div class="news-title"></div><div class="news-meta"><span></span><span></span></div>';
          row.querySelector('.news-title').textContent = title;
          row.querySelector('.news-meta span:first-child').textContent = source;
          row.querySelector('.news-meta span:last-child').textContent = fmtTime(pubDate);
          row.onclick = () => navigateTo(link);
          newsList.appendChild(row);
        });
      } catch (e) { newsList.innerHTML = '<div style="padding:16px;text-align:center;color:#888;">Failed to load news</div>'; }
    }

    function fmtTime(s) {
      if (!s) return '';
      try {
        const ms = Date.now() - new Date(s).getTime(), min = Math.floor(ms/60000);
        if (min < 1) return 'just now'; if (min < 60) return min + 'm ago';
        const h = Math.floor(min/60); if (h < 24) return h + 'h ago';
        return Math.floor(h/24) + 'd ago';
      } catch { return ''; }
    }

    // ── Init ──
    addTab(HOME);
    loadNews();
    setInterval(loadNews, 5 * 60 * 1000);
  </script>
</body>
</html>
