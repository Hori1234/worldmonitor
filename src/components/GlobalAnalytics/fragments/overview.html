<!-- src/components/GlobalAnalytics/fragments/overview.html -->
<style>
  .stocks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 16px;
  }
  .stock-card {
    background: var(--bg, #2a2a2a);
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--border, #444);
    cursor: pointer;
    transition: all 0.2s ease-in-out;
    color: var(--text, #fff);
  }
  .stock-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .stock-price {
    font-size: 24px;
    margin: 8px 0;
  }
  .positive { color: #44ff88; }
  .negative { color: #ff4444; }
  
  /* Hidden by default, shown when card gets 'expanded' class */
  .stock-overview {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border, #444);
    font-size: 0.9em;
    color: var(--text-muted, #aaa);
  }
  .stock-card.expanded .stock-overview {
    display: block;
  }

  .info-btn {
    background: var(--accent-color, #007acc);
    color: white;
    border: none;
    border-radius: 4px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 0.8em;
  }

  /* Modal Styles */
  .ga-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal-content {
    background: var(--panel-bg, #1e1e1e);
    padding: 24px;
    border-radius: 8px;
    width: 400px;
    max-width: 90%;
    color: var(--text, #fff);
    border: 1px solid var(--border, #444);
  }
  .modal-close {
    float: right;
    cursor: pointer;
    font-size: 1.2em;
    background: none;
    border: none;
    color: inherit;
  }
</style>

  <button id="refresh-data-btn" style="padding: 4px 12px; cursor: pointer; background: var(--accent-color); color: white; border: none; border-radius: 4px;">Refresh</button>

<!-- Container where TS will inject the mock data -->
<div id="stocks-container" class="stocks-grid"></div>

<!-- Modal for Detailed Info -->
<div id="stock-modal" class="ga-modal-overlay">
  <div class="modal-content">
    <button id="modal-close-btn" class="modal-close">&times;</button>
    <h2 id="modal-title" style="margin-top: 0;">Stock Details</h2>
    <div id="modal-body"></div>
  </div>
</div>
