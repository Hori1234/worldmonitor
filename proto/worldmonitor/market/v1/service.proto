syntax = "proto3";

package worldmonitor.market.v1;

import "sebuf/http/annotations.proto";
import "worldmonitor/market/v1/list_market_quotes.proto";
import "worldmonitor/market/v1/list_crypto_quotes.proto";
import "worldmonitor/market/v1/list_commodity_quotes.proto";
import "worldmonitor/market/v1/get_sector_summary.proto";
import "worldmonitor/market/v1/list_stablecoin_markets.proto";
import "worldmonitor/market/v1/list_etf_flows.proto";
import "worldmonitor/market/v1/get_country_stock_index.proto";
import "worldmonitor/market/v1/list_gulf_quotes.proto";

// yahoo finance rpc
// ---- NEW yahoo-finance2 RPCs ----
import "worldmonitor/market/v1/get_yahoo_quote.proto";
import "worldmonitor/market/v1/get_yahoo_history.proto";
import "worldmonitor/market/v1/search_yahoo_symbols.proto";
import "worldmonitor/market/v1/list_yahoo_trending.proto";
import "worldmonitor/market/v1/get_yahoo_options.proto";
import "worldmonitor/market/v1/get_yahoo_profile.proto";

// MarketService provides APIs for financial market data from Finnhub, Yahoo Finance, and CoinGecko.
service MarketService {
  option (sebuf.http.service_config) = {base_path: "/api/market/v1"};

  // ListMarketQuotes retrieves stock and index quotes.
  rpc ListMarketQuotes(ListMarketQuotesRequest) returns (ListMarketQuotesResponse) {
    option (sebuf.http.config) = {path: "/list-market-quotes", method: HTTP_METHOD_GET};
  }

  // ListCryptoQuotes retrieves cryptocurrency quotes from CoinGecko.
  rpc ListCryptoQuotes(ListCryptoQuotesRequest) returns (ListCryptoQuotesResponse) {
    option (sebuf.http.config) = {path: "/list-crypto-quotes", method: HTTP_METHOD_GET};
  }

  // ListCommodityQuotes retrieves commodity price quotes from Yahoo Finance.
  rpc ListCommodityQuotes(ListCommodityQuotesRequest) returns (ListCommodityQuotesResponse) {
    option (sebuf.http.config) = {path: "/list-commodity-quotes", method: HTTP_METHOD_GET};
  }

  // GetSectorSummary retrieves market sector performance data from Finnhub.
  rpc GetSectorSummary(GetSectorSummaryRequest) returns (GetSectorSummaryResponse) {
    option (sebuf.http.config) = {path: "/get-sector-summary", method: HTTP_METHOD_GET};
  }

  // ListStablecoinMarkets retrieves stablecoin peg health and market data from CoinGecko.
  rpc ListStablecoinMarkets(ListStablecoinMarketsRequest) returns (ListStablecoinMarketsResponse) {
    option (sebuf.http.config) = {path: "/list-stablecoin-markets", method: HTTP_METHOD_GET};
  }

  // ListEtfFlows retrieves BTC spot ETF flow estimates from Yahoo Finance.
  rpc ListEtfFlows(ListEtfFlowsRequest) returns (ListEtfFlowsResponse) {
    option (sebuf.http.config) = {path: "/list-etf-flows", method: HTTP_METHOD_GET};
  }

  // GetCountryStockIndex retrieves the primary stock index for a country from Yahoo Finance.
  rpc GetCountryStockIndex(GetCountryStockIndexRequest) returns (GetCountryStockIndexResponse) {
    option (sebuf.http.config) = {path: "/get-country-stock-index", method: HTTP_METHOD_GET};
  }

  // ListGulfQuotes retrieves Gulf region market quotes (indices, currencies, oil).
  rpc ListGulfQuotes(ListGulfQuotesRequest) returns (ListGulfQuotesResponse) {
    option (sebuf.http.config) = {path: "/list-gulf-quotes", method: HTTP_METHOD_GET};
  }

  // YAHOO FINANCE RPCs
  // GetYahooQuote retrieves a detailed quote for a single symbol via yahoo-finance2.
  rpc GetYahooQuote(GetYahooQuoteRequest) returns (GetYahooQuoteResponse) {
    option (sebuf.http.config) = {path: "/get-yahoo-quote", method: HTTP_METHOD_GET};
  }

  // GetYahooHistory retrieves OHLCV historical candle data for a symbol.
  rpc GetYahooHistory(GetYahooHistoryRequest) returns (GetYahooHistoryResponse) {
    option (sebuf.http.config) = {path: "/get-yahoo-history", method: HTTP_METHOD_GET};
  }

  // SearchYahooSymbols searches for tickers by keyword.
  rpc SearchYahooSymbols(SearchYahooSymbolsRequest) returns (SearchYahooSymbolsResponse) {
    option (sebuf.http.config) = {path: "/search-yahoo-symbols", method: HTTP_METHOD_GET};
  }

  // ListYahooTrending retrieves currently trending symbols on Yahoo Finance.
  rpc ListYahooTrending(ListYahooTrendingRequest) returns (ListYahooTrendingResponse) {
    option (sebuf.http.config) = {path: "/list-yahoo-trending", method: HTTP_METHOD_GET};
  }

  // GetYahooOptions retrieves the options chain (calls + puts) for a symbol.
  rpc GetYahooOptions(GetYahooOptionsRequest) returns (GetYahooOptionsResponse) {
    option (sebuf.http.config) = {path: "/get-yahoo-options", method: HTTP_METHOD_GET};
  }

  // GetYahooProfile retrieves the company profile and key statistics for a symbol.
  rpc GetYahooProfile(GetYahooProfileRequest) returns (GetYahooProfileResponse) {
    option (sebuf.http.config) = {path: "/get-yahoo-profile", method: HTTP_METHOD_GET};
  }


}
