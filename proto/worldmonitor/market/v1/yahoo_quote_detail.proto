syntax = "proto3";
package worldmonitor.market.v1;

import "buf/validate/validate.proto";
import "sebuf/http/annotations.proto";

// YahooQuoteDetail is a rich quote from yahoo-finance2.
message YahooQuoteDetail {
  string symbol = 1 [(buf.validate.field).required = true, (buf.validate.field).string.min_len = 1];
  string name = 2;
  string exchange = 3;
  string currency = 4;
  double price = 5;
  double previous_close = 6;
  double open = 7;
  double day_high = 8;
  double day_low = 9;
  double fifty_two_week_high = 10;
  double fifty_two_week_low = 11;
  int64 volume = 12 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
  int64 avg_volume = 13 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
  int64 market_cap = 14 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
  double pe_ratio = 15;
  double eps = 16;
  double dividend_yield = 17;
  double change_percent = 18;
  int64 fetched_at = 19 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
}

// YahooHistoryCandle is one OHLCV bar.
message YahooHistoryCandle {
  int64 date = 1 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
  double open = 2;
  double high = 3;
  double low = 4;
  double close = 5;
  int64 volume = 6 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
  double adj_close = 7;
}

// YahooSearchResult is one search match.
message YahooSearchResult {
  string symbol = 1;
  string name = 2;
  string exchange = 3;
  string type = 4;
}

// YahooTrendingSymbol is one trending ticker.
message YahooTrendingSymbol {
  string symbol = 1;
  string name = 2;
  double price = 3;
  double change_percent = 4;
  int64 volume = 5 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
}

// YahooOptionContract is one call or put contract.
message YahooOptionContract {
  string contract_symbol = 1;
  double strike = 2;
  double last_price = 3;
  double bid = 4;
  double ask = 5;
  int64 volume = 6 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
  int64 open_interest = 7 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
  double implied_volatility = 8;
  int64 expiration = 9 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
  string type = 10; // "call" or "put"
}

// YahooProfile is a company summary.
message YahooProfile {
  string symbol = 1;
  string name = 2;
  string sector = 3;
  string industry = 4;
  string country = 5;
  string website = 6;
  string description = 7;
  int64 full_time_employees = 8 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
  int64 market_cap = 9 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
  double pe_ratio = 10;
  double forward_pe = 11;
  double dividend_yield = 12;
  double fifty_two_week_high = 13;
  double fifty_two_week_low = 14;
  double beta = 15;
  double revenue = 16;
  double profit_margin = 17;
}