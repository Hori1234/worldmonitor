syntax = "proto3";
package worldmonitor.market.v1;

import "buf/validate/validate.proto";
import "sebuf/http/annotations.proto";
import "worldmonitor/market/v1/yahoo_quote_detail.proto";

message GetYahooOptionsRequest {
  string symbol = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 20,
    (sebuf.http.query) = { name: "symbol" }
  ];
  // Optional expiration date filter (ISO or epoch). Empty returns nearest expiry.
  string expiration = 2 [(sebuf.http.query) = { name: "expiration" }];
}

message GetYahooOptionsResponse {
  string symbol = 1;
  repeated string expirations = 2;
  repeated YahooOptionContract calls = 3;
  repeated YahooOptionContract puts = 4;
}