syntax = "proto3";
package worldmonitor.market.v1;

import "buf/validate/validate.proto";
import "sebuf/http/annotations.proto";
import "worldmonitor/market/v1/yahoo_quote_detail.proto";

message GetYahooHistoryRequest {
  string symbol = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 20,
    (sebuf.http.query) = { name: "symbol" }
  ];
  // "1d", "5d", "1mo", "3mo", "6mo", "1y", "5y", "max"
  string range = 2 [(sebuf.http.query) = { name: "range" }];
  // "1d", "1wk", "1mo"
  string interval = 3 [(sebuf.http.query) = { name: "interval" }];
}

message GetYahooHistoryResponse {
  string symbol = 1;
  repeated YahooHistoryCandle candles = 2;
}