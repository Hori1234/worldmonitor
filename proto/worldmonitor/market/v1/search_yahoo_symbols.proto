syntax = "proto3";
package worldmonitor.market.v1;

import "buf/validate/validate.proto";
import "sebuf/http/annotations.proto";
import "worldmonitor/market/v1/yahoo_quote_detail.proto";

message SearchYahooSymbolsRequest {
  string query = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 100,
    (sebuf.http.query) = { name: "query" }
  ];
}

message SearchYahooSymbolsResponse {
  repeated YahooSearchResult results = 1;
}